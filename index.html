<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>РосТендер → deal.csv (с индикацией прогресса)</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
        body {
            background: #f5f7fa;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 800px;
            width: 100%;
            padding: 32px;
        }
        h1 {
            font-size: 1.8rem;
            margin: 0 0 8px;
            color: #1e293b;
        }
        .subtitle {
            color: #64748b;
            margin-bottom: 24px;
            font-size: 0.95rem;
        }
        .drop-zone {
            border: 2px dashed #cbd5e1;
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            background: #f8fafc;
            transition: all 0.2s;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .drop-zone.dragover {
            border-color: #3b82f6;
            background: #eff6ff;
        }
        .drop-zone svg {
            width: 48px;
            height: 48px;
            stroke: #94a3b8;
            margin-bottom: 12px;
        }
        .drop-zone .hint {
            color: #475569;
            font-weight: 500;
        }
        .drop-zone .small {
            color: #94a3b8;
            font-size: 0.85rem;
            margin-top: 8px;
        }
        .file-list {
            margin: 24px 0;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            overflow: hidden;
        }
        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: #ffffff;
            border-bottom: 1px solid #e2e8f0;
        }
        .file-item:last-child {
            border-bottom: none;
        }
        .file-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
        }
        .file-name {
            font-weight: 600;
            color: #0f172a;
            word-break: break-word;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .file-status {
            font-size: 0.9rem;
            color: #334155;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .file-status.error {
            color: #b91c1c;
        }
        .file-status.success {
            color: #166534;
        }
        .spinner {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #3b82f6;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .icon-check {
            color: #22c55e;
            font-weight: bold;
            font-size: 1.2rem;
        }
        .icon-error {
            color: #ef4444;
            font-weight: bold;
            font-size: 1.2rem;
        }
        .file-remove {
            color: #ef4444;
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 20px;
            margin-left: 8px;
        }
        .file-remove:hover {
            background: #fee2e2;
        }
        .progress-info {
            text-align: right;
            font-size: 1rem;
            margin-bottom: 16px;
            color: #334155;
        }
        .total-info {
            text-align: right;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 16px;
            color: #0f172a;
        }
        .btn {
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 14px 24px;
            font-size: 1rem;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
        }
        .btn:not(:disabled):hover {
            background: #2563eb;
        }
        .alert {
            padding: 12px 16px;
            border-radius: 12px;
            margin-top: 20px;
            font-size: 0.95rem;
        }
        .alert.error {
            background: #fee2e2;
            color: #b91c1c;
        }
        .alert.success {
            background: #dcfce7;
            color: #166534;
        }
    </style>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
</head>
<body>
    <div class="card">
        <h1>РосТендер → deal.csv</h1>
        <div class="subtitle">
            Загрузите один или несколько файлов. Дубликаты по номеру тендера удаляются.
        </div>

        <div id="dropZone" class="drop-zone">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 16v-6m0 0L9 10m3-4l3 4m-6 0h6" stroke-linecap="round"/>
                <path d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2" />
                <rect x="2" y="8" width="20" height="8" rx="2" ry="2" />
            </svg>
            <div class="hint">Перетащите файлы или нажмите для выбора</div>
            <div class="small">.xlsx (можно несколько)</div>
            <input type="file" id="fileInput" accept=".xlsx, .xls" multiple style="display: none;">
        </div>

        <!-- Список загруженных файлов -->
        <div id="fileList" class="file-list"></div>

        <!-- Прогресс обработки -->
        <div id="progressInfo" class="progress-info" style="display: none;"></div>

        <!-- Общая информация по тендерам -->
        <div id="totalInfo" class="total-info" style="display: none;">
            Всего строк: <span id="totalRows">0</span> | Уникальных: <span id="uniqueRows">0</span>
        </div>

        <button id="downloadBtn" class="btn" disabled>Скачать CSV</button>

        <div id="message" class="alert" style="display: none;"></div>
    </div>

    <script>
        (function() {
            const dropZone = document.getElementById('dropZone');
            const fileInput = document.getElementById('fileInput');
            const fileListDiv = document.getElementById('fileList');
            const progressInfoDiv = document.getElementById('progressInfo');
            const totalInfoDiv = document.getElementById('totalInfo');
            const totalRowsSpan = document.getElementById('totalRows');
            const uniqueRowsSpan = document.getElementById('uniqueRows');
            const downloadBtn = document.getElementById('downloadBtn');
            const messageDiv = document.getElementById('message');

            // Хранилище файлов: каждый элемент = { id, fileName, status, items?, error? }
            let filesData = [];

            function showMessage(text, type = 'error') {
                messageDiv.style.display = 'block';
                messageDiv.className = `alert ${type}`;
                messageDiv.textContent = text;
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 5000);
            }

            // Подсчёт статистики по тендерам (только успешные файлы)
            function calculateTenderStats() {
                let total = 0;
                let unique = 0;
                const seen = new Set();

                filesData.forEach(file => {
                    if (file.status === 'done' && file.items) {
                        file.items.forEach(item => {
                            total++;
                            const num = item.tenderNumber ? item.tenderNumber.trim() : '';
                            if (num !== '') {
                                if (!seen.has(num)) {
                                    seen.add(num);
                                    unique++;
                                }
                            } else {
                                unique++;
                            }
                        });
                    }
                });

                return { total, unique };
            }

            // Подсчёт прогресса файлов
            function countFileProgress() {
                let total = filesData.length;
                let processed = filesData.filter(f => f.status === 'done' || f.status === 'error').length;
                return { total, processed };
            }

            // Обновление всего UI
            function renderAll() {
                // Список файлов
                if (filesData.length === 0) {
                    fileListDiv.innerHTML = '';
                    progressInfoDiv.style.display = 'none';
                    totalInfoDiv.style.display = 'none';
                    downloadBtn.disabled = true;
                    return;
                }

                let html = '';
                filesData.forEach(file => {
                    let statusIcon = '';
                    let statusText = '';
                    let statusClass = '';

                    switch (file.status) {
                        case 'pending':
                            statusIcon = '<span class="spinner"></span>';
                            statusText = 'Обрабатывается...';
                            break;
                        case 'processing':
                            statusIcon = '<span class="spinner"></span>';
                            statusText = 'Обработка...';
                            break;
                        case 'done':
                            statusIcon = '<span class="icon-check">✅</span>';
                            statusText = `Готово (тендеров: ${file.items.length})`;
                            statusClass = 'success';
                            break;
                        case 'error':
                            statusIcon = '<span class="icon-error">❌</span>';
                            statusText = 'Ошибка: ' + escapeHtml(file.error);
                            statusClass = 'error';
                            break;
                        default:
                            statusText = 'Неизвестный статус';
                    }

                    html += `
                        <div class="file-item" data-file-id="${escapeHtml(file.id)}">
                            <div class="file-info">
                                <div class="file-name">
                                    ${statusIcon}
                                    ${escapeHtml(file.fileName)}
                                </div>
                                <div class="file-status ${statusClass}">${statusText}</div>
                            </div>
                            <button class="file-remove" data-file-id="${escapeHtml(file.id)}" title="Удалить">✕</button>
                        </div>
                    `;
                });

                fileListDiv.innerHTML = html;

                // Прогресс файлов
                const prog = countFileProgress();
                if (prog.total > 0) {
                    progressInfoDiv.style.display = 'block';
                    progressInfoDiv.textContent = `Обработано ${prog.processed} из ${prog.total} файлов`;
                } else {
                    progressInfoDiv.style.display = 'none';
                }

                // Статистика тендеров
                const stats = calculateTenderStats();
                totalRowsSpan.textContent = stats.total;
                uniqueRowsSpan.textContent = stats.unique;
                totalInfoDiv.style.display = 'block';
                downloadBtn.disabled = (stats.unique === 0);

                // Обработчики удаления
                document.querySelectorAll('.file-remove').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const fileId = e.target.getAttribute('data-file-id');
                        if (fileId) removeFile(fileId);
                        e.stopPropagation();
                    });
                });
            }

            function escapeHtml(unsafe) {
                return unsafe.replace(/[&<>"]/g, function(m) {
                    if(m === '&') return '&amp;';
                    if(m === '<') return '&lt;';
                    if(m === '>') return '&gt;';
                    if(m === '"') return '&quot;';
                    return m;
                });
            }

            function removeFile(fileId) {
                filesData = filesData.filter(f => f.id !== fileId);
                renderAll();
            }

            // Генерация уникального ID
            function generateFileId() {
                return 'f_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            }

            // Добавление файла с начальным статусом pending
            function addFileForProcessing(file) {
                const fileId = generateFileId();
                const fileEntry = {
                    id: fileId,
                    fileName: file.name,
                    status: 'pending'
                };
                filesData.push(fileEntry);
                renderAll();

                // Меняем статус на processing и запускаем обработку
                setTimeout(() => {
                    const idx = filesData.findIndex(f => f.id === fileId);
                    if (idx !== -1 && filesData[idx].status === 'pending') {
                        filesData[idx].status = 'processing';
                        renderAll();
                        processFile(file, fileId);
                    }
                }, 50); // небольшая задержка, чтобы увидеть смену статуса
            }

            // Асинхронная обработка файла
            async function processFile(file, fileId) {
                try {
                    const result = await readExcel(file);
                    const idx = filesData.findIndex(f => f.id === fileId);
                    if (idx !== -1) {
                        filesData[idx] = {
                            ...filesData[idx],
                            status: 'done',
                            items: result.items,
                            count: result.items.length
                        };
                    }
                } catch (err) {
                    const idx = filesData.findIndex(f => f.id === fileId);
                    if (idx !== -1) {
                        filesData[idx] = {
                            ...filesData[idx],
                            status: 'error',
                            error: err.message
                        };
                    }
                }
                renderAll();
            }

            // Чтение Excel (без изменений, кроме возвращаемого формата)
            async function readExcel(file) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const data = new Uint8Array(e.target.result);
                            const workbook = XLSX.read(data, { type: 'array', cellDates: true });
                            const firstSheet = workbook.Sheets[workbook.SheetNames[0]];

                            const rows = XLSX.utils.sheet_to_json(firstSheet, { header: 1, defval: '' });

                            if (rows.length < 3) {
                                throw new Error('Файл слишком короткий. Ожидается минимум 3 строки.');
                            }

                            const headers = rows[2] || [];
                            const columnMap = {
                                tenderSubject: findColumnIndex(headers, 'Предмет тендера'),
                                customer: findColumnIndex(headers, 'Заказчик'),
                                contactPerson: findColumnIndex(headers, 'Контактное лицо организатора'),
                                startPrice: findColumnIndex(headers, 'Начальная цена, руб'),
                                sourceLink: findColumnIndex(headers, 'Ссылка на источник'),
                                endDate: findColumnIndex(headers, 'Дата окончания (МСК)'),
                                tenderNumber: findColumnIndex(headers, 'Номер тендера')
                            };

                            const missing = [];
                            if (columnMap.tenderSubject === -1) missing.push('Предмет тендера');
                            if (columnMap.customer === -1) missing.push('Заказчик');
                            if (columnMap.startPrice === -1) missing.push('Начальная цена, руб');
                            if (columnMap.sourceLink === -1) missing.push('Ссылка на источник');
                            if (columnMap.endDate === -1) missing.push('Дата окончания (МСК)');

                            if (missing.length > 0 && !(missing.length === 1 && missing[0] === 'Номер тендера')) {
                                throw new Error(`Не найдены столбцы: ${missing.join(', ')}`);
                            }

                            const items = [];
                            for (let i = 3; i < rows.length; i++) {
                                const row = rows[i];
                                if (!row || row.every(cell => cell === undefined || cell === null || cell === '')) {
                                    continue;
                                }

                                const tenderSubject = getCellValue(row, columnMap.tenderSubject);
                                const customer = getCellValue(row, columnMap.customer);
                                const contact = getCellValue(row, columnMap.contactPerson);
                                let price = getCellValue(row, columnMap.startPrice);
                                let source = getCellValue(row, columnMap.sourceLink);
                                let endDate = '';

                                // Дата
                                const dateCellAddress = XLSX.utils.encode_cell({ c: columnMap.endDate, r: i });
                                const dateCell = firstSheet[dateCellAddress];
                                if (dateCell) {
                                    if (dateCell.t === 'd' && dateCell.v instanceof Date) {
                                        endDate = formatDate(dateCell.v);
                                    } else {
                                        endDate = getCellValue(row, columnMap.endDate);
                                    }
                                } else {
                                    endDate = getCellValue(row, columnMap.endDate);
                                }

                                // Гиперссылка
                                const linkCellAddress = XLSX.utils.encode_cell({ c: columnMap.sourceLink, r: i });
                                const linkCell = firstSheet[linkCellAddress];
                                if (linkCell && linkCell.l && linkCell.l.Target) {
                                    source = linkCell.l.Target;
                                }

                                // Номер тендера
                                let tenderNumber = '';
                                if (columnMap.tenderNumber !== -1) {
                                    tenderNumber = getCellValue(row, columnMap.tenderNumber);
                                }

                                // Форматирование цены
                                let formattedPrice = '';
                                if (price && price.toString().trim() !== '') {
                                    let priceStr = price.toString().trim();
                                    priceStr = priceStr.replace(/\s/g, '').replace(',', '.');
                                    const num = parseFloat(priceStr);
                                    if (!isNaN(num)) {
                                        formattedPrice = num.toFixed(2);
                                    }
                                }

                                const csvRow = {
                                    'Название сделки': tenderSubject,
                                    'Компания':        customer,
                                    'Контакт':         contact,
                                    'Валюта':          'RUB',
                                    'Воронка':         'Тендеры',
                                    'Стадия сделки':   'Распределение',
                                    'НМЦК':            formattedPrice,
                                    'Ссылка на закупку': source,
                                    'окончание срока подачи заявок': endDate,
                                    'Ответственный':   assignResponsible(tenderSubject)
                                };

                                items.push({ csvRow, tenderNumber });
                            }

                            if (items.length === 0) {
                                throw new Error('Нет данных после обработки (пустые строки?)');
                            }

                            resolve({ items, count: items.length });
                        } catch (err) {
                            reject(err);
                        }
                    };
                    reader.onerror = () => reject(new Error('Ошибка чтения файла'));
                    reader.readAsArrayBuffer(file);
                });
            }

            function findColumnIndex(headers, colName) {
                return headers.findIndex(h => h && h.toString().trim() === colName);
            }

            function getCellValue(row, index) {
                if (index === -1 || index >= row.length) return '';
                const val = row[index];
                if (val === undefined || val === null) return '';
                if (val instanceof Date && !isNaN(val)) {
                    return formatDate(val);
                }
                return val.toString().trim();
            }

            function formatDate(date) {
                const pad = (n) => n.toString().padStart(2, '0');
                return `${pad(date.getDate())}.${pad(date.getMonth()+1)}.${date.getFullYear()} ${pad(date.getHours())}:${pad(date.getMinutes())}:${pad(date.getSeconds())}`;
            }

            // Правила назначения ответственных по ключевым словам в названии тендера
            const RESPONSIBLE_RULES = [
                { person: 'Сычевский В.',    tags: ['смазочн','смазк','масл','гсм','горюче-смазочн','антифриз','coilcoating','coil','рулонного металла с покрытием'] },
                { person: 'Кондратенко А.',  tags: ['сож','смазочно-охлаждающ'] },
                { person: 'Мирошников А.',   tags: ['лкм','лакокрасочн','порошков','резервуар'] },
                { person: 'Лушин И.',        tags: ['разметк','судов','судоремонт'] },
                { person: 'Жорник Г.',       tags: ['водоподготовк','реагент','коагулянт','флокулянт','оксихлорид','полиоксихлорид'] },
            ];

            function assignResponsible(title) {
                if (!title) return '';
                const lower = title.toLowerCase();
                for (const rule of RESPONSIBLE_RULES) {
                    for (const tag of rule.tags) {
                        if (lower.includes(tag.toLowerCase())) {
                            return rule.person;
                        }
                    }
                }
                return '';
            }

            // Полный заголовок нового шаблона CRM
            const CSV_HEADER = ["ID","Название сделки","Вероятность","Компания","Контакт","Сумма","Валюта","Источник","Дополнительно об источнике","Товар","Цена","Количество","Воронка","Стадия сделки","Сделка закрыта","Доступен для всех","Тип","Комментарий","Дата начала","Предполагаемая дата закрытия","Дата события","Тип события","Описание события","Ответственный","Продукт 1 ЗП","Продукт 2 ЗП","Продукт 3 ЗП","Продукт 4 ЗП","Продукт 5 ЗП","Продукт 6 ЗП","Дата поставки по заявке ЗП","Продукты ЗП","Необходимое количество","ФИО Инициатора","Код подразделения","Проект","Код Затрат","Остаток на складе","Наименование","Крайний срок поставки","Цель приобретения","Договор","Счет","Альтернативные Поставщики","Список счетов/кп","E-mail инициатора","Номер документа","Договор есть?","Вносились поставщики?","Спецификация","Договор(подписанный)","УПД по приходу","Список заявок на оплату","Сумма счета","Дефектная ведомость","Организация(наша)","Сумма доставки","Транспортная компания","Адрес Склада","Данные для логиста","Сумма конкурента 1","Сумма конкурента 2","КП конкурента 1","КП конкурента 2","Конкурент 1","Конкурент 2","УПД-2 по приходу","Инициатор","Необходимое количество ЗО","Единица измерения ЗО","Цена за единицу ЗО","% аванс ЗО","% отсрочки ЗО ","Календ. дней отсрочки ЗО","ДЛ Причина ЗП","Вид продукта ЗП","Дата доплаты ЗО","Сумма доплаты ЗО","Фото автомобиля (РЕФ/Не РЕФ)","Фото упаковки","Фото наличия пломб","Фото этикеток (по каждой партии)","Фото загруженной продукции","Фото протокола испытаний","Скан сертификата качества","Номер партии","Подкласс опасности","ДП ГП2 Фактическая дата передачи на склад ЗП","ДП ГП3 Фактическая дата передачи на склад ЗП","ДП ГП4 Фактическая дата передачи на склад ЗП","Класс опасности ЗП","Общая масса брутто, кг ЗП","Дата входа в стадию Принято ЗО","ЗП Номер внутренней заявки","ТК ЗП","Данные водителя ЗП","Данные авто ЗП","ТК ЗП (компания)","Подписанная спецификация","ДЛ Фактическая дата отправки ЗП","Заявки на закупку ЗП","Обеспеченность сырь             // Генерация итогового CSV с дедупликацией
            function generateDeduplicatedCSV() {
                const allRows = [CSV_HEADER];
                const seen = new Set();

                filesData.forEach(file => {
                    if (file.status === 'done' && file.items) {
                        file.items.forEach(item => {
                            const num = item.tenderNumber ? item.tenderNumber.trim() : '';
                            if (num !== '') {
                                if (!seen.has(num)) {
                                    seen.add(num);
                                    allRows.push(buildPositionalRow(item.csvRow));
                                }
                            } else {
                                allRows.push(buildPositionalRow(item.csvRow));
                            }
                        });
                    }
                });

                return '\uFEFF' + allRows.map(row => row.map(cell => escapeCSV(cell)).join(';')).join('\n');
            }

            // Преобразует объект {поле: значение} в позиционный массив по CSV_HEADER
            function buildPositionalRow(obj) {
                return CSV_HEADER.map(col => obj[col] !== undefined ? obj[col] : '');
            }

            function escapeCSV(field) {
                if (field === null || field === undefined) return '';
                const str = String(field);
                if (str.includes(';') || str.includes('"') || str.includes('\n') || str.includes('\r')) {
                    return '"' + str.replace(/"/g, '""') + '"';
                }
                return str;
            }

            function downloadCSV(content, filename = 'deal.csv') {
                const blob = new Blob([content], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = filename;
                link.click();
                URL.revokeObjectURL(link.href);
            }

            // --- События ---
            dropZone.addEventListener('click', () => fileInput.click());

            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.classList.add('dragover');
            });

            dropZone.addEventListener('dragleave', () => {
                dropZone.classList.remove('dragover');
            });

            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.classList.remove('dragover');
                const files = Array.from(e.dataTransfer.files);
                files.forEach(file => addFileForProcessing(file));
            });

            fileInput.addEventListener('change', (e) => {
                const files = Array.from(e.target.files);
                files.forEach(file => addFileForProcessing(file));
                fileInput.value = ''; // разрешить повторный выбор тех же файлов
            });

            downloadBtn.addEventListener('click', () => {
                const csv = generateDeduplicatedCSV();
                downloadCSV(csv);
                const stats = calculateTenderStats();
                showMessage(`CSV сгенерирован, уникальных тендеров: ${stats.unique}`, 'success');
            });

            renderAll();
        })();
